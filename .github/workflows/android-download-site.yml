name: Build Android app and publish download site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "mobile-download-site"
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Build standalone release APK
        run: cd android && ./gradlew assembleRelease

      - name: Prepare download site
        run: |
          mkdir -p site
          cp android/app/build/outputs/apk/release/app-release.apk site/PowerWashOps.apk
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Download PowerWash Ops</title>
              <style>
                :root { color-scheme: light; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
                body { margin: 0; min-height: 100vh; background: #eef6f8; color: #12323b; display: grid; place-items: center; }
                main { width: min(680px, calc(100% - 32px)); background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 18px 60px rgba(15, 61, 74, 0.18); }
                h1 { margin: 0 0 8px; font-size: clamp(32px, 8vw, 58px); line-height: 0.95; color: #0f3d4a; }
                p { color: #526b73; line-height: 1.6; }
                a.button { display: inline-flex; align-items: center; justify-content: center; min-height: 52px; padding: 0 22px; margin-top: 14px; border-radius: 8px; background: #10b7c7; color: #062d36; text-decoration: none; font-weight: 900; }
                .note { margin-top: 18px; padding-top: 18px; border-top: 1px solid #d9e8ec; font-size: 14px; }
              </style>
            </head>
            <body>
              <main>
                <h1>PowerWash Ops</h1>
                <p>Download the native Android app for The Powerwashing Pros operations dashboard.</p>
                <a class="button" href="./PowerWashOps.apk" download>Download Android APK</a>
                <p class="note">On Android, open the downloaded file and allow installation from your browser if prompted. iPhone does not allow free direct app installs from a website; it requires TestFlight or the App Store.</p>
              </main>
            </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build-android
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
